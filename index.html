<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loup-Garou en Famille - Version Finale</title>
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-color: #1f2833;
            --accent-blood: #8a0303;
            --accent-gold: #c5a059;
            --text-color: #c5c6c7;
        }

        body { 
            font-family: 'Georgia', serif; 
            text-align: center; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding: 15px;
            margin: 0;
            transition: background-color 1.5s ease;
        }

        body.nuit { background-color: #020205; }
        body.elimine { background-color: #2a0101 !important; color: #999 !important; }

        h1 { color: var(--accent-blood); text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        h2 { color: var(--accent-gold); }

        .card { 
            background-color: var(--card-color); 
            padding: 20px; 
            border-radius: 12px; 
            margin: 15px auto; 
            max-width: 400px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.5); 
            border: 1px solid #2f3e46;
        }

        button { 
            background-color: #111; 
            color: var(--accent-gold); 
            border: 2px solid var(--accent-gold); 
            padding: 12px 24px; 
            font-size: 16px; 
            font-family: 'Georgia', serif;
            border-radius: 6px; 
            cursor: pointer; 
            margin: 8px; 
            width: 85%; 
            max-width: 280px; 
        }
        button:hover { background-color: var(--accent-gold); color: black; }

        .btn-blood { border-color: var(--accent-blood); color: var(--accent-blood); }
        .btn-blood:hover { background-color: var(--accent-blood); color: white; }
        
        .btn-small-kill {
            background-color: #000;
            color: var(--accent-blood);
            border: 1px solid var(--accent-blood);
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            display: inline-block;
            margin-left: 10px;
        }
        .btn-small-kill:hover { background-color: var(--accent-blood); color: white; }

        input { 
            padding: 12px; font-size: 16px; border-radius: 6px; border: 1px solid var(--accent-gold); 
            background-color: #111; color: white; margin: 8px; text-align: center; width: 75%; max-width: 240px; 
        }

        .status { font-weight: bold; font-size: 24px; margin: 15px 0; color: var(--accent-gold); }
        
        .secret-card {
            background-color: #2c3e50; color: white; padding: 25px; border-radius: 10px;
            cursor: pointer; font-size: 20px; font-weight: bold; border: 3px dashed var(--accent-gold);
            margin: 15px auto; max-width: 250px;
        }

        /* Styles des listes de joueurs */
        ul { list-style-type: none; padding: 0; }
        li { background: rgba(255,255,255,0.05); padding: 12px; margin: 6px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        li.mort { text-decoration: line-through; opacity: 0.4; background: rgba(138, 3, 3, 0.2); color: #ff6666; }

        #screen-game, #mj-controls, #player-role-zone, #village-life-zone { display: none; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
</head>
<body>

    <h1>🐺 LE LOUP-GAROU 🐺</h1>

    <!-- ÉCRAN 1 : CONFIGURATION -->
    <div id="screen-setup" class="card">
        <h2>Configuration de la partie</h2>
        <input type="text" id="familyName" value="mafamille" placeholder="Nom de famille">
        <input type="text" id="playerPseudo" placeholder="Votre Prénom / Pseudo">
        <br><br>
        <button onclick="rejoindre('mj')" class="btn-blood">👑 Être le Maître du Jeu</button>
        <button onclick="rejoindre('joueur')">🛡️ Être un Joueur</button>
    </div>

    <!-- ÉCRAN 2 : LE JEU EN DIRECT -->
    <div id="screen-game">
        <div class="card">
            <h2 id="roleTitle">Salon de jeu</h2>
            <p id="gameStatus" class="status">Connexion en cours... ⏳</p>
        </div>

        <!-- ZONE RÔLE SECRET (Joueurs uniquement) -->
        <div id="player-role-zone" class="card">
            <h3>👁️ Votre Rôle Secret :</h3>
            <div id="roleCard" class="secret-card" onclick="revelerRole()">
                CLIQUEZ POUR RÉVÉLER
            </div>
        </div>

        <!-- ZONE LISTE DU VILLAGE (Visible pour les joueurs une fois le jeu lancé) -->
        <div id="village-life-zone" class="card">
            <h3>👥 Habitants du Village :</h3>
            <ul id="villagePlayersList"></ul>
        </div>

        <!-- ZONE MAÎTRE DU JEU -->
        <div id="mj-controls" class="card" style="border-color: var(--accent-blood);">
            <h2>Panneau de Contrôle (MJ)</h2>
            
            <!-- Avant de lancer -->
            <div id="mj-lobby">
                <h3>Joueurs connectés (<span id="count">0</span>) :</h3>
                <ul id="mjLobbyList"></ul>
                <button onclick="distribuerRoles()" class="btn-blood">🎲 Distribuer les Rôles & Lancer</button>
            </div>

            <!-- Pendant le jeu -->
            <div id="mj-game-actions" style="display:none;">
                <button onclick="envoyerAction('NUIT')">💤 Faire dormir le village</button>
                <button onclick="envoyerAction('JOUR')">☀️ Réveiller le village</button>
                
                <h3 style="margin-top:20px; border-top:1px solid #444; padding-top:15px;">Gestion du Village :</h3>
                <ul id="mjInGameList"></ul>
            </div>
        </div>
    </div>

    <script>
        let client;
        let family = "";
        let pseudo = "";
        let monRolePublic = ""; 
        let monRoleSecret = "En attente...";
        let listeJoueurs = []; 
        let estVivant = true;
        
        function rejoindre(roleChoisi) {
            family = document.getElementById('familyName').value.trim().toLowerCase();
            pseudo = document.getElementById('playerPseudo').value.trim();
            monRolePublic = roleChoisi;

            if(!family) return alert("Entrez un nom de famille !");
            if(monRolePublic === 'joueur' && !pseudo) return alert("Entrez votre prénom !");
            if(monRolePublic === 'mj') pseudo = "Maître du Jeu";

            document.getElementById('screen-setup').style.display = 'none';
            document.getElementById('screen-game').style.display = 'block';

            client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

            client.on('connect', function () {
                document.getElementById('gameStatus').innerText = "Connecté ! En attente... 🟢";
                client.subscribe("loupgarufamille/" + family + "/global");

                if (monRolePublic === 'mj') {
                    document.getElementById('mj-controls').style.display = 'block';
                    document.getElementById('roleTitle').innerText = "🧙‍♂️ Vous êtes le Maître du Jeu";
                    client.subscribe("loupgarufamille/" + family + "/lobby");
                } else {
                    document.getElementById('roleTitle').innerText = "🧑‍🌾 Joueur : " + pseudo;
                    document.getElementById('player-role-zone').style.display = 'block';
                    client.subscribe("loupgarufamille/" + family + "/private/" + pseudo.toLowerCase());
                    client.publish("loupgarufamille/" + family + "/lobby", pseudo);
                }
            });

            client.on('message', function (topic, message) {
                const msg = message.toString();

                // 1. Le MJ reçoit les inscriptions
                if (topic.endsWith("/lobby") && monRolePublic === 'mj') {
                    if (!listeJoueurs.includes(msg)) {
                        listeJoueurs.push(msg);
                        mettreAJourLobbyMJ();
                    }
                }

                // 2. Le joueur reçoit son rôle
                if (topic.includes("/private/") && monRolePublic === 'joueur') {
                    monRoleSecret = msg;
                    document.getElementById('gameStatus').innerText = "Rôle reçu ! 🤫";
                }

                // 3. Messages globaux (Ordres du MJ)
                if (topic.endsWith("/global")) {
                    const statusText = document.getElementById('gameStatus');
                    
                    if (msg === 'NUIT') {
                        document.body.classList.add('nuit');
                        statusText.innerText = "La nuit tombe... Tout le monde dort 🌙";
                    } 
                    else if (msg === 'JOUR') {
                        document.body.classList.remove('nuit');
                        statusText.innerText = "Le soleil se lève... ☀️";
                    } 
                    else if (msg.startsWith('START:')) {
                        // Récupère la liste finale des joueurs envoyée par le MJ
                        listeJoueurs = msg.replace('START:', '').split(',');
                        if(monRolePublic === 'joueur') {
                            document.getElementById('village-life-zone').style.display = 'block';
                            creerListeJoueursPublic();
                        }
                        statusText.innerText = "La partie commence !";
                    }
                    else if (msg.startsWith('MORT:')) {
                        const victime = msg.replace('MORT:', '');
                        marquerMort(victime);
                    }
                }
            });
        }

        // --- FONCTIONS DU JOUEUR ---
        function revelerRole() {
            const card = document.getElementById('roleCard');
            if (card.innerText === "CLIQUEZ POUR RÉVÉLER") {
                card.innerText = monRoleSecret;
                card.style.backgroundColor = "#8a0303";
            } else {
                card.innerText = "CLIQUEZ POUR RÉVÉLER";
                card.style.backgroundColor = "#2c3e50";
            }
        }

        function creerListeJoueursPublic() {
            const ul = document.getElementById('villagePlayersList');
            ul.innerHTML = "";
            listeJoueurs.forEach(p => {
                ul.innerHTML += `<li id="public-p-${p.toLowerCase()}"><span>👤 ${p}</span> <b style="color:#4eed50" id="public-status-${p.toLowerCase()}">Vivant</b></li>`;
            });
        }

        function marquerMort(nomVictime) {
            // Si c'est moi qui suis mort
            if (monRolePublic === 'joueur' && pseudo.toLowerCase() === nomVictime.toLowerCase()) {
                estVivant = false;
                document.body.classList.add('elimine');
                document.getElementById('gameStatus').innerText = "Vous avez été éliminé... 💀";
                document.getElementById('gameStatus').style.color = "red";
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]); // Fait vibrer le téléphone
            }

            // Mettre à jour l'affichage sur la liste publique
            const liPublic = document.getElementById(`public-p-${nomVictime.toLowerCase()}`);
            if (liPublic) {
                liPublic.classList.add('mort');
                document.getElementById(`public-status-${nomVictime.toLowerCase()}`).innerText = "Mort 💀";
            }

            // Mettre à jour l'affichage sur la liste du MJ
            const liMJ = document.getElementById(`mj-p-${nomVictime.toLowerCase()}`);
            if (liMJ) {
                liMJ.classList.add('mort');
                const btn = document.getElementById(`btn-kill-${nomVictime.toLowerCase()}`);
                if (btn) btn.style.display = 'none';
            }
        }

        // --- FONCTIONS DU MAÎTRE DU JEU ---
        function mettreAJourLobbyMJ() {
            document.getElementById('count').innerText = listeJoueurs.length;
            const ul = document.getElementById('mjLobbyList');
            ul.innerHTML = "";
            listeJoueurs.forEach(p => { ul.innerHTML += "<li>👤 " + p + "</li>"; });
        }

        function distribuerRoles() {
            if (listeJoueurs.length === 0) return alert("Aucun joueur connecté !");
            
            let roles = [];
            let nbJoueurs = listeJoueurs.length;

            if (nbJoueurs <= 3) { roles = ["Loup-Garou", "Voyante", "Villageois"]; } 
            else if (nbJoueurs === 4) { roles = ["Loup-Garou", "Voyante", "Sorcière", "Villageois"]; } 
            else {
                roles = ["Loup-Garou", "Loup-Garou", "Voyante", "Sorcière"];
                while (roles.length < nbJoueurs) { roles.push("Villageois"); }
            }

            roles.sort(() => Math.random() - 0.5);

            for (let i = 0; i < nbJoueurs; i++) {
                client.publish("loupgarufamille/" + family + "/private/" + listeJoueurs[i].toLowerCase(), roles[i]);
            }

            // Le MJ envoie la liste des joueurs à tout le monde pour créer le tableau des vivants/morts
            client.publish("loupgarufamille/" + family + "/global", "START:" + listeJoueurs.join(','));

            // Basculer l'écran MJ en mode jeu
            document.getElementById('mj-lobby').style.display = 'none';
            document.getElementById('mj-game-actions').style.display = 'block';
            
            // Créer la liste de gestion des morts pour le MJ
            const ul = document.getElementById('mjInGameList');
            ul.innerHTML = "";
            listeJoueurs.forEach(p => {
                ul.innerHTML += `<li id="mj-p-${p.toLowerCase()}"><span>👤 ${p}</span> <button id="btn-kill-${p.toLowerCase()}" class="btn-small-kill" onclick="eliminerJoueur('${p}')">💀 Éliminer</button></li>`;
            });
        }

        function eliminerJoueur(nomJoueur) {
            if (confirm(`Confirmer l'élimination de ${nomJoueur} ?`)) {
                client.publish("loupgarufamille/" + family + "/global", "MORT:" + nomJoueur);
            }
        }

        function envoyerAction(action) {
            if(client && client.connected) {
                client.publish("loupgarufamille/" + family + "/global", action);
            }
        }
    </script>
</body>
</html>
